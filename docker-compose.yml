services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: legal-research-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    extra_hosts:
      # Linux Docker: reach Ollama on the host (Docker Desktop sets host.docker.internal by default)
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    # Single worker: each worker loads PyTorch + embedding + summarizer in memory.
    command:
      [
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "1",
        "--proxy-headers",
        "--forwarded-allow-ips",
        "*"
      ]
    volumes:
      - huggingface_cache:/home/appuser/.cache/huggingface
    networks:
      - legal-research-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: legal-research-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      PORT: 3000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - legal-research-network

networks:
  legal-research-network:
    driver: bridge

volumes:
  huggingface_cache:
